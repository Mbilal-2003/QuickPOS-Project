name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/*", "bugfix/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: phpunit

    - name: Syntax Check
      run: |
        php -l index.php
        php -l process_form.php

    - name: Run PHPUnit Tests
      run: phpunit tests/ContactFormTest.php